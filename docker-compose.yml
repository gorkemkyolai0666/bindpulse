version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bindpulse
      POSTGRES_PASSWORD: bindpulse123
      POSTGRES_DB: bindpulse
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "4032:4032"
    environment:
      DATABASE_URL: postgresql://bindpulse:bindpulse123@postgres:5432/bindpulse?schema=public
      JWT_SECRET: bindpulse-dev-secret
      FRONTEND_URL: http://localhost:3032
      PORT: 4032
    depends_on:
      - postgres

  frontend:
    build: ./frontend
    ports:
      - "3032:3032"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4032/api
    depends_on:
      - backend

volumes:
  pgdata:
